version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      web-minor-and-patch:
        update-types: [minor, patch]
      web-major:
        update-types: [major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]
    # Node alternates LTS (even) and short-lived "Current" (odd) release
    # lines. Stay on LTS for the web build stage; skip odd majors so
    # Dependabot only proposes bumps between LTS lines (e.g. 24 → 26).
    ignore:
      - dependency-name: "docker/library/node"
        versions: ["25.x", "27.x", "29.x", "31.x"]
