name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose channel matches tag
        # The repo's docker-compose.yml is the recommended starting point
        # for new users, so it must reference the current minor's patch
        # channel. Cutting a release whose minor doesn't match the pin
        # would ship a stale default to anyone who clones HEAD. Fail fast
        # here rather than publish an inconsistent release.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          tag_channel="${tag%.*}"  # strip patch: 0.2.3 -> 0.2
          compose_tag=$(grep -oE 'ghcr\.io/[^:[:space:]]+:[0-9.]+' docker-compose.yml | head -1 | awk -F: '{print $NF}')
          if [ "$tag_channel" != "$compose_tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME pins channel $tag_channel but docker-compose.yml references :$compose_tag. Bump the compose image tag and re-tag."
            exit 1
          fi
          echo "compose tag :$compose_tag matches release minor $tag_channel"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - name: Build timestamp
        id: ts
        run: echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILT_AT=${{ steps.ts.outputs.built_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
