# Tailscale overlay — adds private tailnet auth to the LAN compose.
#
# Layered on top of docker-compose.yml:
#   podman compose -f docker-compose.yml -f docker-compose.tailscale.yml up -d
#
# Effect:
#   - A `tailscale` sidecar joins your tailnet using $TS_AUTHKEY.
#   - The `app` service runs in the sidecar's network namespace, so the
#     only way to reach veckomenyn is through Tailscale. Direct host
#     connections fail by construction.
#   - Reach the app from any tailnet device at:
#       http://veckomenyn.<your-tailnet>.ts.net:8080
#
# Get an auth key at https://login.tailscale.com/admin/settings/keys
# (mark it ephemeral if you want the node to clean itself up later).

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: veckomenyn
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  app:
    # Host port binding goes away — the app is only on the tailnet now.
    ports: !reset []
    network_mode: service:tailscale

volumes:
  tailscale-state:
