name: veckomenyn

services:
  db:
    image: public.ecr.aws/docker/library/postgres:17-alpine
    environment:
      POSTGRES_USER: veckomenyn
      POSTGRES_PASSWORD: veckomenyn
      POSTGRES_DB: veckomenyn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veckomenyn"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    # Pinned to the 0.4.x patch channel: get bug fixes, no surprise feature
    # changes. Pin tighter (e.g. :0.4.0) for absolute stability, looser
    # (:0 for any 0.x, :latest for bleeding edge) for more updates. See
    # README "Upgrading" for the full channel matrix.
    #
    # Building from source? Add docker-compose.dev.yml as an override:
    #   podman compose -f docker-compose.yml -f docker-compose.dev.yml up
    image: ghcr.io/simonnordberg/veckomenyn:0.4
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://veckomenyn:veckomenyn@db:5432/veckomenyn?sslmode=disable
      # The app generates and persists its own AES master key on first
      # boot. To bring your own (e.g. driven by an external KMS), set
      # MASTER_KEY=<base64-32-bytes> in .env and uncomment below.
      # MASTER_KEY: ${MASTER_KEY}
      # Pre-migration pg_dump lands in ./backups on the host so a bad
      # upgrade never costs you data, and you can list, copy, or rsync
      # the dumps without going into the container.
      BACKUP_DIR: /var/lib/veckomenyn/backups
      # In-app update controls. Watchtower runs as a passive trigger
      # sidecar (no polling); the app POSTs here to drive both the
      # manual "Update now" button and the optional auto-update toggle.
      UPDATE_TRIGGER_URL: http://watchtower:8080/v1/update
      UPDATE_TRIGGER_TOKEN: ${WATCHTOWER_TOKEN:-veckomenyn-internal}
    volumes:
      # Bind mount, NOT a named volume: survives `docker compose down -v`
      # so wiping the DB never wipes the snapshots that could restore it.
      # The :Z suffix relabels the dir for SELinux-enforcing hosts (Fedora,
      # RHEL); it's a no-op everywhere else.
      - ./backups:/var/lib/veckomenyn/backups:Z
    ports:
      # Override with HOST_PORT=8081 in .env if 8080 is taken.
      - "${HOST_PORT:-8080}:8080"
    labels:
      # Pair of labels for the local watchtower sidecar below.
      # `enable=true` plus `--label-enable` opts this container in.
      # `scope=veckomenyn` plus `--scope veckomenyn` keeps any other
      # watchtower on the host from also targeting it (would race).
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "veckomenyn"
    restart: unless-stopped

  # Update trigger sidecar. Watchtower runs in HTTP-API-only mode (no
  # polling), so it does nothing until the app POSTs to /v1/update. The
  # app drives both the manual "Update now" button and the optional
  # auto-update toggle in Settings; this container exists so something
  # outside the app's own process can recreate the app's container.
  # Pre-migration snapshots run on every restart, so a triggered upgrade
  # can't eat your data.
  watchtower:
    image: containrrr/watchtower:latest
    environment:
      # Pin the Docker Engine API version. Without this, the docker SDK
      # negotiates a version that podman's docker-compat socket rejects
      # ("client version 1.25 is too old, minimum 1.40"). 1.41 is
      # supported by both Docker Engine and podman 4+.
      DOCKER_API_VERSION: "1.41"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN:-veckomenyn-internal}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --cleanup
      - --http-api-update
      - --scope
      - veckomenyn
    restart: unless-stopped

volumes:
  pgdata:
